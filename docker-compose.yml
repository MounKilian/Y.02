name: airviz
services:
  proxy:
    image: nginx:alpine
    restart: always
    ports:
      - 80:80
    volumes:
      - ./proxy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - site
      - api

  db:
    image: postgres
    restart: always
    shm_size: 128mb
    # ports:
    #  - 5432:5432
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./app
    restart: always
    # ports:
    #   - 8000:8000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
    # ports:
    #   - 4000:4000
    depends_on:
      api:
        condition: service_healthy

  site:
    build: ./client
    restart: always
    depends_on:
      - server

volumes:
  db_data:
    driver: local