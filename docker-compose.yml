name: airviz
services:
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    ports:
      - '80:80'   # Public HTTP
      - '81:81'   # Admin UI for the Proxy
      # - '443:443' # Public HTTPS
    volumes:
      - ./proxy/data:/data
      - ./proxy/letsencrypt:/etc/letsencrypt

  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: postgres

  api:
    build: ./app
    restart: always
    # ports:
    #   - 8000:8000
    depends_on:
      - db

  server:
    build: ./server
    restart: always
    # ports:
    #   - 4000:4000
    depends_on:
      - api

  site:
    build: ./client
    restart: always
    # ports:
    #   - 80:80
    depends_on:
      - server

volumes:
  db_data:
    driver: local