# =============================================================================
# postgresql.conf  Nud Slave (standby coordinator Citus)
# PostgreSQL 16 + Citus 12
#
# Le Slave rplique le WAL du Master en continu et rpond aux requtes
# en lecture seule (hot_standby = on). En cas de dfaillance du Master,
# Repmgr promeut ce nud en nouveau Master (failover automatique).
# =============================================================================

# -----------------------------------------------------------------------------
# CONNEXIONS
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200


# -----------------------------------------------------------------------------
# RPLICATION  Configuration standby
# -----------------------------------------------------------------------------
hot_standby = on
# Autorise les connexions en lecture seule pendant la rcupration WAL.
# Sans ce paramtre, le Slave refuse toutes les connexions entrantes,
# rendant impossible son utilisation pour dlester le Master en lecture.

hot_standby_feedback = on
# Le Slave informe le Master des transactions en cours sur le Slave.
# vite que le Master supprime des lignes encore ncessaires au Slave
# pour ses requtes en lecture (prvient les "query conflict" en standby).

primary_conninfo = 'host=citus_master port=5432 user=replicator sslmode=prefer'
# Chane de connexion vers le Master pour la rplication streaming.
# 'citus_master' est rsolu par le DNS interne Docker  le Slave n'a pas
# besoin de connatre l'IP du Master, qui peut changer  chaque redmarrage.
# Le mot de passe est lu depuis le fichier secret /run/secrets/replication_password
# via la variable d'environnement PGPASSWORD dfinie dans init-slave.sh.

primary_slot_name = 'slave_slot'
# Utilise un slot de rplication nomm sur le Master.
# Garantit que le Master conserve les WAL ncessaires au Slave mme
# en cas de dconnexion prolonge, sans dpendre de wal_keep_size seul.

recovery_target_timeline = 'latest'
# Suit automatiquement la timeline la plus rcente aprs un failover.
# Ncessaire pour que le Slave puisse se reconnecter au nouveau Master
# aprs que l'ancien Slave ait t promu.


# -----------------------------------------------------------------------------
# CITUS
# -----------------------------------------------------------------------------
shared_preload_libraries = 'citus'
citus.node_conninfo = 'sslmode=prefer'


# -----------------------------------------------------------------------------
# PERFORMANCES (identiques au Master pour cohrence)
# -----------------------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 16MB
maintenance_work_mem = 128MB


# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
log_connections = on
log_disconnections = on
