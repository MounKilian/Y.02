# =============================================================================
# postgresql.conf  Nud Master (coordinator Citus)
# PostgreSQL 16 + Citus 12
#
# Ce fichier configure le coordinator Citus qui joue simultanment
# deux rles : coordinator du cluster Citus (routing des requtes vers
# les workers) et Master PostgreSQL (rplication WAL vers le Slave).
# =============================================================================

# -----------------------------------------------------------------------------
# CONNEXIONS
# -----------------------------------------------------------------------------
listen_addresses = '*'
# coute sur toutes les interfaces rseau du conteneur.
# L'isolation rseau est assure par Docker (network_internal: internal: true),
# non par PostgreSQL lui-mme  restreindre listen_addresses  une IP
# prcise est inutile dans ce contexte et fragiliserait la configuration.

port = 5432
max_connections = 200
# 200 connexions simultanes : compromis entre disponibilit et mmoire.
# Chaque connexion PostgreSQL consomme ~5-10 Mo de RAM en charge.
# Le connection pooling (PgBouncer) est recommand en production pour
# dpasser cette limite sans augmenter la RAM alloue.


# -----------------------------------------------------------------------------
# RPLICATION EN STREAMING (WAL)
# Ces paramtres activent la rplication vers le Slave et sont requis
# pour la haute disponibilit du coordinator.
# -----------------------------------------------------------------------------
wal_level = replica
# 'replica' active les journaux WAL ncessaires  la rplication en streaming.
# 'minimal' dsactiverait la rplication, 'logical' activerait la rplication
# logique (non ncessaire ici et plus consommatrice en ressources).

max_wal_senders = 5
# Nombre maximal de processus WAL sender simultans.
# Allou pour : 1 Slave actif + 1 pg_basebackup lors de l'init du Slave
# + 1 slot de secours pour les reconnexions + 2 workers Citus ventuels.

wal_keep_size = 256MB
# Volume minimal de WAL conserv sur le Master aprs archivage.
# Si le Slave se dconnecte temporairement, il peut rattraper jusqu'
# 256 Mo de retard sans devoir reconstruire depuis zro (pg_basebackup).
# Valeur augmente  256 Mo pour tenir compte du volume des donnes Citus.

max_replication_slots = 5
# Les slots de rplication garantissent que le Master conserve les WAL
# ncessaires  un Slave spcifique, mme pendant une longue dconnexion.
# Plus fiable que wal_keep_size seul mais consomme de l'espace disque.

synchronous_commit = off
# 'off' : le Master confirme le commit au client avant que le WAL soit
# rpliqu sur le Slave. Amliore les performances d'criture au prix
# d'un risque de perte de quelques transactions en cas de crash simultan
# du Master et du Slave. Acceptable pour des donnes mto/pollution
# collectes priodiquement (la prochaine collecte recouvrirait la perte).


# -----------------------------------------------------------------------------
# CITUS  Extension de sharding distribu
# -----------------------------------------------------------------------------
shared_preload_libraries = 'citus'
# Citus doit tre charg au dmarrage de PostgreSQL via shared_preload_libraries.
# Sans cette ligne, CREATE EXTENSION citus choue avec :
# "ERROR: citus extension requires citus to be in shared_preload_libraries"

citus.node_conninfo = 'sslmode=prefer'
# Mode de connexion entre le coordinator et les workers.
# 'prefer' tente SSL et se replie sur non-SSL si indisponible.
# En production avec des certificats TLS, utiliser 'sslmode=require'.


# -----------------------------------------------------------------------------
# PERFORMANCES
# -----------------------------------------------------------------------------
shared_buffers = 256MB
# Cache mmoire PostgreSQL. Rgle gnrale : 25% de la RAM disponible.
#  ajuster selon la mmoire alloue au conteneur dans Kubernetes.

effective_cache_size = 768MB
# Estimation de la mmoire disponible pour le cache disque OS.
# Utilis par le planificateur de requtes pour choisir entre
# sequential scan et index scan. N'alloue pas de mmoire relle.

work_mem = 16MB
# Mmoire alloue par opration de tri/hachage (ORDER BY, DISTINCT, JOIN).
# Multipli par le nombre de connexions simultanes pour la RAM totale.

maintenance_work_mem = 128MB
# Mmoire pour les oprations de maintenance (VACUUM, CREATE INDEX).
# Plus lev que work_mem car ces oprations sont ponctuelles.


# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
log_destination = 'stderr'
# Logs vers stderr : Docker collecte automatiquement stderr/stdout
# et les rend disponibles via 'docker logs' et cAdvisor/Prometheus.

logging_collector = off
# Dsactiv : la collecte des logs est dlgue  Docker.

log_min_duration_statement = 1000
# Loguer toutes les requtes prenant plus de 1 seconde.
# Permet d'identifier les requtes lentes sans polluer les logs
# avec les requtes rapides du monitoring (toutes les 15s).

log_connections = on
log_disconnections = on
# Tracer les connexions/dconnexions pour dtecter les connexions
# orphelines et valider le comportement du connection pool.
