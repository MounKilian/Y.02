# =============================================================================
# datasources/prometheus.yml — Provisioning de la datasource Prometheus
#
# Grafana charge automatiquement ce fichier au démarrage et configure
# la connexion à Prometheus sans intervention manuelle dans l'UI.
# Le provisioning garantit la reproductibilité : recréer le conteneur
# Grafana recrée automatiquement la datasource.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # 'proxy' : Grafana interroge Prometheus server-side.
    # Le navigateur ne contacte jamais Prometheus directement,
    # ce qui est cohérent avec l'isolation réseau :
    # Prometheus est dans network_monitoring, pas accessible depuis internet.
    url: http://prometheus:9090
    # 'prometheus' est résolu par le DNS interne Docker (network_monitoring).
    isDefault: true
    editable: false
    # editable: false — la datasource ne peut pas être modifiée depuis l'UI.
    # Toute modification doit passer par ce fichier versionné dans Git,
    # garantissant la traçabilité des changements de configuration.
    jsonData:
      timeInterval: "15s"
      # Aligné sur scrape_interval de Prometheus : Grafana ne tentera pas
      # d'afficher des données à une résolution plus fine que la collecte.
      httpMethod: POST
      # POST est recommandé pour les requêtes PromQL longues qui dépassent
      # la limite de longueur d'URL des requêtes GET.
