# =============================================================================
# dashboards/dashboards.yml — Provisioning des dashboards Grafana
#
# Grafana charge les fichiers JSON des dashboards depuis le dossier
# configuré ici. Ajouter un fichier JSON dans ce dossier suffit pour
# qu'il apparaisse dans Grafana au prochain redémarrage (ou rechargement).
# =============================================================================

apiVersion: 1

providers:
  - name: 'Plateforme météo & pollution'
    orgId: 1
    folder: 'Infrastructure'
    type: file
    disableDeletion: true
    # disableDeletion: true — les dashboards provisionnés ne peuvent pas
    # être supprimés depuis l'UI Grafana. Seule la suppression du fichier
    # JSON et le redémarrage du conteneur les suppriment réellement.
    updateIntervalSeconds: 30
    # Grafana vérifie les modifications des fichiers JSON toutes les 30s.
    # Permet de mettre à jour un dashboard en éditant son fichier JSON
    # sans redémarrer le conteneur.
    allowUiUpdates: false
    # allowUiUpdates: false — les modifications via l'UI Grafana ne sont
    # pas persistées (elles seraient perdues au prochain rechargement).
    # Pour modifier un dashboard, éditer le fichier JSON source.
    options:
      path: /etc/grafana/provisioning/dashboards
