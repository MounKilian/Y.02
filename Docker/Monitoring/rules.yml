groups:

  - name: availability
    rules:

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} down"
          description: "Service {{ $labels.job }} ({{ $labels.instance }}) unreachable for 1 minute."

      - alert: ContainerRestarting
        expr: rate(container_last_seen{name!=""}[5m]) == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restart loop"
          description: "Container {{ $labels.name }} is restarting in a loop."


  - name: resources
    rules:

      - alert: ContainerCpuHigh
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.name }}"
          description: "Container {{ $labels.name }} using {{ $value | printf \"%.1f\" }}% CPU for 5 minutes."

      - alert: ContainerMemoryHigh
        expr: |
          container_memory_usage_bytes{name!=""} /
          container_spec_memory_limit_bytes{name!=""} * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.name }}"
          description: "Container {{ $labels.name }} using {{ $value | printf \"%.1f\" }}% of memory limit."

      - alert: ContainerMemoryCritical
        expr: |
          container_memory_usage_bytes{name!=""} /
          container_spec_memory_limit_bytes{name!=""} * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory on {{ $labels.name }}"
          description: "Container {{ $labels.name }} at {{ $value | printf \"%.1f\" }}% memory limit. OOM Kill imminent."


  - name: postgresql
    rules:

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL/Citus coordinator down"
          description: "Citus coordinator is not responding to PostgreSQL connections."

      - alert: PostgresReplicationLag
        expr: pg_replication_lag > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL replication lag high: {{ $value }}s"
          description: "Slave is {{ $value }}s behind master. Risk of data loss on failover."

      - alert: PostgresReplicationLagCritical
        expr: pg_replication_lag > 120
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical replication lag: {{ $value }}s"
          description: "Replication lag of {{ $value }}s -- immediate action required."

      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count > pg_settings_max_connections * 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections near maximum"
          description: "{{ $value }} active connections (>85% of max)."

      - alert: CitusWorkerDown
        expr: citus_node_connection_count{node_role="worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Citus worker {{ $labels.node_name }} unreachable"
          description: "Citus worker {{ $labels.node_name }} is no longer reachable from coordinator."
