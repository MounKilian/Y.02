# =============================================================================
# nginx.conf — Configuration Nginx pour le frontend Vue.js
#
# Monté comme template dans /etc/nginx/templates/default.conf.template.
# Nginx traite automatiquement les fichiers *.template via envsubst au
# démarrage : la variable ${BACKEND_URL} est résolue depuis l'environnement
# du conteneur (défini dans docker-compose.yml) et le fichier résolu est
# écrit dans /etc/nginx/conf.d/default.conf.
#
# Avantage : aucune valeur n'est compilée dans l'image Docker. L'URL du
# backend peut changer sans rebuilder l'image — seul un redémarrage du
# conteneur suffit.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------------------------
    # Fallback Vue Router (mode history)
    #
    # Sans cette règle, tout rechargement de page sur une route non-racine
    # retourne un 404 : Nginx chercherait un fichier correspondant au chemin
    # URL, qui n'existe pas côté serveur (le routing est géré côté client
    # par Vue Router).
    # try_files tente d'abord le fichier exact ($uri), puis le répertoire
    # ($uri/), et renvoie index.html en dernier recours pour que Vue Router
    # prenne la main et affiche la bonne vue.
    # --------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # Reverse proxy vers le backend Fastify
    #
    # Toutes les requêtes préfixées /api/ sont proxifiées vers le backend.
    # Le frontend ne connaît pas l'adresse du backend — il passe par Nginx
    # qui résout 'backend' via le DNS interne Docker (network_public).
    #
    # proxy_pass retire le préfixe /api avant de transmettre la requête :
    #   GET /api/stations → GET /stations sur le backend Fastify
    #
    # proxy_http_version 1.1 + Connection "" : active le keepalive HTTP/1.1
    # vers le backend, réutilisant les connexions TCP entre les requêtes
    # et réduisant la latence de reconnexion.
    # --------------------------------------------------------------------------
    location /api/ {
        proxy_pass ${BACKEND_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        # Timeout conservatif : les endpoints OpenData peuvent être lents.
        # 30s couvre les requêtes d'agrégation sur la base Citus.
    }

    # --------------------------------------------------------------------------
    # Cache long terme des assets statiques versionnés
    #
    # Vite/Vue CLI génère des noms de fichiers avec hash de contenu
    # (ex: app.3f2a1b.js). Ces fichiers sont immuables par conception :
    # toute modification du code produit un nouveau hash donc un nouveau
    # nom de fichier. Un cache d'1 an est sûr et évite des requêtes
    # réseau inutiles à chaque chargement de page.
    #
    # Cache-Control: immutable indique aux navigateurs modernes que
    # le fichier ne changera jamais — aucune revalidation conditionnelle
    # (If-None-Match) n'est effectuée pendant la durée du cache.
    # --------------------------------------------------------------------------
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        # Pas de log pour les assets statiques : ils représentent
        # la majorité du trafic et n'ont aucune valeur diagnostique.
    }

    # --------------------------------------------------------------------------
    # Images — cache plus court car modifiables sans changement de nom
    # --------------------------------------------------------------------------
    location ~* \.(png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --------------------------------------------------------------------------
    # Désactivation des logs pour les healthchecks
    #
    # Traefik, cAdvisor et Kubernetes font des requêtes fréquentes sur /
    # pour les healthchecks. Les loguer polluerait les logs applicatifs
    # sans aucune valeur diagnostique.
    # --------------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # --------------------------------------------------------------------------
    # Sécurité — headers HTTP
    #
    # X-Frame-Options   : empêche le clickjacking (inclusion dans une iframe)
    # X-Content-Type    : empêche le MIME sniffing par les navigateurs
    # Referrer-Policy   : limite les informations transmises dans Referer
    # --------------------------------------------------------------------------
    add_header X-Frame-Options       "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header Referrer-Policy        "strict-origin"       always;

    # --------------------------------------------------------------------------
    # Compression gzip
    #
    # Réduit la taille des transferts réseau pour les assets textuels.
    # Le bundle JS Vue.js peut passer de ~500 Ko à ~150 Ko compressé.
    # gzip_proxied any : compresse aussi les réponses proxifiées (/api/).
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;
}
