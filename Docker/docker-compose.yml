secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  replication_password:
    file: ./secrets/replication_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  grafana_password:
    file: ./secrets/grafana_password.txt

volumes:
  db_master_data:
  db_slave_data:
  db_worker1_data:
  db_worker2_data:
  prometheus_data:
  grafana_data:

networks:
  network_public:
    driver: bridge
  network_internal:
    driver: bridge
    internal: true
  network_monitoring:
    driver: bridge

