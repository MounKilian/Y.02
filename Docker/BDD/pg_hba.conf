# =============================================================================
# pg_hba.conf — Nœud Master (coordinator Citus)
# Contrôle des accès par hôte (Host-Based Authentication)
#
# Chaque ligne définit : TYPE  DATABASE  USER  ADDRESS  METHOD
# Les règles sont évaluées dans l'ordre — la première correspondance s'applique.
# =============================================================================

# -----------------------------------------------------------------------------
# CONNEXIONS LOCALES (socket Unix)
# Utilisées par les scripts d'initialisation (initdb.d) qui s'exécutent
# dans le même conteneur que PostgreSQL.
# -----------------------------------------------------------------------------
local   all             all                                     trust
# 'trust' sur socket Unix est sûr : seuls les processus du même conteneur
# peuvent accéder au socket. Il n'y a pas d'accès réseau possible via ce type.


# -----------------------------------------------------------------------------
# CONNEXIONS RÉSEAU INTERNES
# Le réseau Docker network_internal utilise la plage 172.16.0.0/12.
# Toutes les connexions réseau utilisent scram-sha-256, le mécanisme
# d'authentification recommandé depuis PostgreSQL 14 en remplacement
# de md5 (vulnérable aux attaques par dictionnaire sur le hash).
# -----------------------------------------------------------------------------

# Connexions applicatives (backend, service_data, postgres_exporter)
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             10.0.0.0/8              scram-sha-256
# Deux plages couvertes : 172.16.0.0/12 (réseau bridge Docker standard)
# et 10.0.0.0/8 (plage alternative selon la configuration Docker/Kubernetes).

# Connexions de réplication depuis le Slave
# L'utilisateur 'replicator' n'est autorisé que pour la base 'replication'
# (pseudo-base PostgreSQL) depuis les plages réseau internes.
host    replication     replicator      172.16.0.0/12           scram-sha-256
host    replication     replicator      10.0.0.0/8              scram-sha-256

# Connexions inter-nœuds Citus (coordinator ↔ workers)
# Citus utilise le compte applicatif principal pour communiquer
# entre coordinator et workers — pas de compte dédié nécessaire.
host    all             all             127.0.0.1/32            scram-sha-256
