# =============================================================================
# postgresql.conf — Nœud Master (coordinator Citus)
# PostgreSQL 16 + Citus 12
#
# Ce fichier configure le coordinator Citus qui joue simultanément
# deux rôles : coordinator du cluster Citus (routing des requêtes vers
# les workers) et Master PostgreSQL (réplication WAL vers le Slave).
# =============================================================================

# -----------------------------------------------------------------------------
# CONNEXIONS
# -----------------------------------------------------------------------------
listen_addresses = '*'
# Écoute sur toutes les interfaces réseau du conteneur.
# L'isolation réseau est assurée par Docker (network_internal: internal: true),
# non par PostgreSQL lui-même — restreindre listen_addresses à une IP
# précise est inutile dans ce contexte et fragiliserait la configuration.

port = 5432
max_connections = 200
# 200 connexions simultanées : compromis entre disponibilité et mémoire.
# Chaque connexion PostgreSQL consomme ~5-10 Mo de RAM en charge.
# Le connection pooling (PgBouncer) est recommandé en production pour
# dépasser cette limite sans augmenter la RAM allouée.


# -----------------------------------------------------------------------------
# RÉPLICATION EN STREAMING (WAL)
# Ces paramètres activent la réplication vers le Slave et sont requis
# pour la haute disponibilité du coordinator.
# -----------------------------------------------------------------------------
wal_level = replica
# 'replica' active les journaux WAL nécessaires à la réplication en streaming.
# 'minimal' désactiverait la réplication, 'logical' activerait la réplication
# logique (non nécessaire ici et plus consommatrice en ressources).

max_wal_senders = 5
# Nombre maximal de processus WAL sender simultanés.
# Alloué pour : 1 Slave actif + 1 pg_basebackup lors de l'init du Slave
# + 1 slot de secours pour les reconnexions + 2 workers Citus éventuels.

wal_keep_size = 256MB
# Volume minimal de WAL conservé sur le Master après archivage.
# Si le Slave se déconnecte temporairement, il peut rattraper jusqu'à
# 256 Mo de retard sans devoir reconstruire depuis zéro (pg_basebackup).
# Valeur augmentée à 256 Mo pour tenir compte du volume des données Citus.

max_replication_slots = 5
# Les slots de réplication garantissent que le Master conserve les WAL
# nécessaires à un Slave spécifique, même pendant une longue déconnexion.
# Plus fiable que wal_keep_size seul mais consomme de l'espace disque.

synchronous_commit = off
# 'off' : le Master confirme le commit au client avant que le WAL soit
# répliqué sur le Slave. Améliore les performances d'écriture au prix
# d'un risque de perte de quelques transactions en cas de crash simultané
# du Master et du Slave. Acceptable pour des données météo/pollution
# collectées périodiquement (la prochaine collecte recouvrirait la perte).


# -----------------------------------------------------------------------------
# CITUS — Extension de sharding distribué
# -----------------------------------------------------------------------------
shared_preload_libraries = 'citus'
# Citus doit être chargé au démarrage de PostgreSQL via shared_preload_libraries.
# Sans cette ligne, CREATE EXTENSION citus échoue avec :
# "ERROR: citus extension requires citus to be in shared_preload_libraries"

citus.node_conninfo = 'sslmode=prefer'
# Mode de connexion entre le coordinator et les workers.
# 'prefer' tente SSL et se replie sur non-SSL si indisponible.
# En production avec des certificats TLS, utiliser 'sslmode=require'.


# -----------------------------------------------------------------------------
# PERFORMANCES
# -----------------------------------------------------------------------------
shared_buffers = 256MB
# Cache mémoire PostgreSQL. Règle générale : 25% de la RAM disponible.
# À ajuster selon la mémoire allouée au conteneur dans Kubernetes.

effective_cache_size = 768MB
# Estimation de la mémoire disponible pour le cache disque OS.
# Utilisé par le planificateur de requêtes pour choisir entre
# sequential scan et index scan. N'alloue pas de mémoire réelle.

work_mem = 16MB
# Mémoire allouée par opération de tri/hachage (ORDER BY, DISTINCT, JOIN).
# Multiplié par le nombre de connexions simultanées pour la RAM totale.

maintenance_work_mem = 128MB
# Mémoire pour les opérations de maintenance (VACUUM, CREATE INDEX).
# Plus élevé que work_mem car ces opérations sont ponctuelles.


# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
log_destination = 'stderr'
# Logs vers stderr : Docker collecte automatiquement stderr/stdout
# et les rend disponibles via 'docker logs' et cAdvisor/Prometheus.

logging_collector = off
# Désactivé : la collecte des logs est déléguée à Docker.

log_min_duration_statement = 1000
# Loguer toutes les requêtes prenant plus de 1 seconde.
# Permet d'identifier les requêtes lentes sans polluer les logs
# avec les requêtes rapides du monitoring (toutes les 15s).

log_connections = on
log_disconnections = on
# Tracer les connexions/déconnexions pour détecter les connexions
# orphelines et valider le comportement du connection pool.
