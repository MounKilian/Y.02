# =============================================================================
# postgresql.conf — Nœuds Workers Citus (worker1 et worker2)
# PostgreSQL 16 + Citus 12
#
# Les workers stockent physiquement les shards de données.
# Ils reçoivent les requêtes du coordinator uniquement — jamais directement
# des services applicatifs. Leur configuration est plus simple que le Master :
# pas de réplication, pas de hot_standby.
# =============================================================================

# -----------------------------------------------------------------------------
# CONNEXIONS
# Les workers n'acceptent des connexions que depuis le coordinator Citus.
# L'isolation est assurée par network_internal (internal: true) et pg_hba.conf.
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
# Moins de connexions que le Master : seul le coordinator se connecte,
# avec un pool de connexions interne à Citus (citus.max_adaptive_executor_pool_size).


# -----------------------------------------------------------------------------
# CITUS — Configuration worker
# -----------------------------------------------------------------------------
shared_preload_libraries = 'citus'
# Obligatoire sur les workers comme sur le coordinator.

citus.node_conninfo = 'sslmode=prefer'

citus.shard_count = 32
# Nombre de shards créés lors de create_distributed_table().
# 32 shards répartis sur 2 workers = 16 shards par worker.
# Valeur standard recommandée par Citus pour 1-2 workers.
# Augmenter si des workers supplémentaires sont ajoutés ultérieurement.

citus.shard_replication_factor = 1
# Pas de réplication des shards entre workers dans cette configuration.
# La haute disponibilité est assurée au niveau du coordinator (Master/Slave),
# pas au niveau des workers. En production critique, utiliser 2 pour
# dupliquer chaque shard sur un second worker.


# -----------------------------------------------------------------------------
# PERFORMANCES
# -----------------------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 16MB
maintenance_work_mem = 128MB


# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
